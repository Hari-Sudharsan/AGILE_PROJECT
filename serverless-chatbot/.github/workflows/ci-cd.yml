# .github/workflows/ci-cd.yml
# ═══════════════════════════════════════════════════════════════
# GitHub Actions CI/CD Pipeline for Serverless Chatbot
# ═══════════════════════════════════════════════════════════════
#
# This pipeline runs automatically when:
# - You push any code to 'main' or 'develop' branch
# - You create a Pull Request to 'main'
#
# Pipeline Stages:
# 1. TEST   → Run all Python unit tests
# 2. BUILD  → Build the React frontend
# 3. DEPLOY → Deploy to AWS (only on main branch)
#
# Required GitHub Secrets (Settings → Secrets → Actions):
# - AWS_ACCESS_KEY_ID       → Your AWS access key
# - AWS_SECRET_ACCESS_KEY   → Your AWS secret key
# - S3_BUCKET_NAME          → e.g., my-chatbot-frontend
# - LAMBDA_FUNCTION_NAME    → e.g., serverless-chatbot
# ═══════════════════════════════════════════════════════════════

name: 🤖 Chatbot CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# Environment variables available to all jobs
env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'
  AWS_REGION: 'us-east-1'

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Run Tests
  # ─────────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download the repository code
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Python environment
      - name: 🐍 Set Up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Step 3: Cache pip packages (speeds up future runs)
      - name: 📦 Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('backend/requirements.txt') }}

      # Step 4: Install Python dependencies
      - name: ⬇️ Install Backend Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      # Step 5: Run linting (code quality check)
      - name: 🔍 Lint Code (flake8)
        run: |
          pip install flake8
          flake8 backend/ --max-line-length=120 --ignore=E501,W503 || true
        continue-on-error: true  # Don't fail the pipeline on lint warnings

      # Step 6: Run unit tests
      - name: 🧪 Run Unit Tests
        run: |
          pip install pytest pytest-cov
          pytest tests/ -v --tb=short --cov=backend --cov-report=xml
        env:
          ENVIRONMENT: test
          PYTHONPATH: .

      # Step 7: Upload test coverage report
      - name: 📊 Upload Coverage Report
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true


  # ─────────────────────────────────────────────
  # JOB 2: Build Frontend
  # ─────────────────────────────────────────────
  build-frontend:
    name: 🏗️ Build React Frontend
    runs-on: ubuntu-latest
    needs: test  # Only runs if tests pass

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # Set up Node.js for React
      - name: 🟢 Set Up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Install React dependencies
      - name: ⬇️ Install Frontend Dependencies
        run: |
          cd frontend
          npm ci  # 'ci' is faster than 'install' for pipelines

      # Build the production React app
      - name: 🏗️ Build React App
        run: |
          cd frontend
          npm run build
        env:
          REACT_APP_API_URL: ${{ secrets.API_URL || 'http://localhost:8000' }}
          CI: false  # Prevents treating warnings as errors

      # Save the build output for the deploy job
      - name: 💾 Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 1


  # ─────────────────────────────────────────────
  # JOB 3: Deploy to AWS (only on main branch)
  # ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to AWS
    runs-on: ubuntu-latest
    needs: [test, build-frontend]  # Only runs if both jobs pass
    if: github.ref == 'refs/heads/main'  # Only deploy from main branch

    environment: production  # Uses GitHub Environments (optional approval gates)

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # Configure AWS credentials from GitHub Secrets
      - name: ☁️ Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Set up Python for backend packaging
      - name: 🐍 Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Package backend for Lambda deployment
      - name: 📦 Package Backend for Lambda
        run: |
          cd backend
          pip install -r requirements.txt --target ./package
          cp *.py ./package/
          cp -r ../ml ./package/ml
          cd package
          zip -r ../../backend-lambda.zip .
          echo "✅ Lambda package created"

      # Deploy to AWS Lambda
      - name: 🚀 Deploy Backend to Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://backend-lambda.zip \
            --region ${{ env.AWS_REGION }}
          echo "✅ Lambda deployed"

      # Download frontend build from earlier job
      - name: 📥 Download Frontend Build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/build

      # Upload frontend to S3
      - name: 🌐 Deploy Frontend to S3
        run: |
          aws s3 sync frontend/build/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --cache-control "max-age=86400"
          echo "✅ Frontend deployed to S3"

      # Invalidate CloudFront cache (if using CloudFront CDN)
      - name: 🔄 Invalidate CloudFront Cache
        run: |
          if [ -n "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" ]; then
            aws cloudfront create-invalidation \
              --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
              --paths "/*"
            echo "✅ CloudFront cache invalidated"
          else
            echo "⚠️ No CloudFront distribution configured, skipping"
          fi
        continue-on-error: true

      # Post deployment summary
      - name: 📋 Deployment Summary
        run: |
          echo "═══════════════════════════════"
          echo "  🎉 Deployment Complete!"
          echo "═══════════════════════════════"
          echo "  Branch:   ${{ github.ref_name }}"
          echo "  Commit:   ${{ github.sha }}"
          echo "  Time:     $(date -u)"
          echo "═══════════════════════════════"
